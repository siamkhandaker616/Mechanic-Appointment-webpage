<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="80" height="80">
  <g transform="rotate(30 50 50)">
    <!-- Ceramic Ribs (top) -->
    <rect x="42" y="10" width="16" height="30" rx="3" fill="#ffffff" stroke="#1a1a2e" stroke-width="4"/>
    <line x1="42" y1="20" x2="58" y2="20" stroke="#1a1a2e" stroke-width="3"/>
    <line x1="42" y1="30" x2="58" y2="30" stroke="#1a1a2e" stroke-width="3"/>
    <!-- Terminal (tip) -->
    <rect x="46" y="4" width="8" height="6" rx="2" fill="#ffd43f" stroke="#1a1a2e" stroke-width="3.5"/>
    <!-- Hex nut body (middle) -->
    <path d="M36,40 L64,40 L60,54 L40,54 Z" fill="#b0c4de" stroke="#1a1a2e" stroke-width="4" stroke-linejoin="round"/>
    <!-- Metal Thread (bottom) -->
    <rect x="42" y="54" width="16" height="20" fill="#b0c4de" stroke="#1a1a2e" stroke-width="4"/>
    <line x1="42" y1="60" x2="58" y2="60" stroke="#1a1a2e" stroke-width="3"/>
    <line x1="42" y1="68" x2="58" y2="68" stroke="#1a1a2e" stroke-width="3"/>
    <!-- Electrode (tip) -->
    <path d="M46,74 L46,84 L50,84" fill="none" stroke="#1a1a2e" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Spark -->
    <path d="M54,82 L58,86 L52,90 L60,94" fill="none" stroke="#00ffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
