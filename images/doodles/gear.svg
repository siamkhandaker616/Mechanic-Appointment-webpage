<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="80" height="80">
  <g transform="translate(50, 50)">
    <!-- Gear Teeth -->
    <g stroke="#1a1a2e" stroke-width="4.5" stroke-linejoin="round" fill="#b0c4de">
      <rect x="-10" y="-45" width="20" height="90" rx="4"/>
      <rect x="-10" y="-45" width="20" height="90" rx="4" transform="rotate(60)"/>
      <rect x="-10" y="-45" width="20" height="90" rx="4" transform="rotate(120)"/>
    </g>
    <!-- Gear Center Body -->
    <circle cx="0" cy="0" r="28" fill="#b0c4de" stroke="#1a1a2e" stroke-width="4.5"/>
    <!-- Inner Ring -->
    <circle cx="0" cy="0" r="12" fill="#ffd43f" stroke="#1a1a2e" stroke-width="4"/>
    <!-- Axle hole -->
    <circle cx="0" cy="0" r="4" fill="#1a1a2e"/>
  </g>
</svg>
