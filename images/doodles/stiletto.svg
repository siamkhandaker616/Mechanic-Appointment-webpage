<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="80" height="80">
  <g transform="translate(5, 5)">
    <!-- Heel (stiletto peg with metallic core highlight) -->
    <line x1="28" y1="52" x2="28" y2="82" stroke="#1a1a2e" stroke-width="5" stroke-linecap="round"/>
    <line x1="26.5" y1="54" x2="26.5" y2="80" stroke="#d1d5db" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Red inner lining showing at the top ankle collar -->
    <path d="M 28,25 C 28,25 34,22 42,25 C 46,27 45,32 40,32 C 34,32 28,28 28,25 Z" fill="#e63946" stroke="#1a1a2e" stroke-width="3"/>

    <!-- Main Boot Body (detailed leather curves) -->
    <path d="M 28,25 
             C 22,25 24,40 28,52 
             C 35,52 48,68 62,80 
             C 65,80 88,80 88,80 
             C 88,80 72,70 60,56 
             C 54,50 44,28 42,25 Z" 
          fill="#1a1a2e" stroke="#1a1a2e" stroke-width="4.5" stroke-linejoin="round"/>

    <!-- Soft folds and creases in the leather (white highlights) -->
    <path d="M 32,51 C 36,54 40,52 44,55" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
    <path d="M 52,65 C 56,68 60,67 64,70" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
    <path d="M 60,74 Q 68,76 74,78" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Lace eyelets (silver rings along the tongue) -->
    <circle cx="39" cy="32" r="2.5" fill="#d1d5db" stroke="#1a1a2e" stroke-width="2"/>
    <circle cx="43" cy="40" r="2.5" fill="#d1d5db" stroke="#1a1a2e" stroke-width="2"/>
    <circle cx="47" cy="48" r="2.5" fill="#d1d5db" stroke="#1a1a2e" stroke-width="2"/>
    <circle cx="52" cy="56" r="2.5" fill="#d1d5db" stroke="#1a1a2e" stroke-width="2"/>
    <circle cx="58" cy="64" r="2.5" fill="#d1d5db" stroke="#1a1a2e" stroke-width="2"/>

    <!-- Criss-cross laces (gold highlights) -->
    <path d="M 39,32 L 47,48 M 43,40 L 52,56 M 47,48 L 58,64" fill="none" stroke="#ffd43f" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Lace bow tie at the top -->
    <path d="M 39,32 C 34,26 38,20 39,32 C 44,26 40,20 39,32 Z" fill="#ffd43f" stroke="#1a1a2e" stroke-width="2"/>
    <path d="M 39,32 L 32,38 M 39,32 L 35,42" fill="none" stroke="#ffd43f" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Comic-style glossy reflection on the toe -->
    <path d="M 76,77 C 80,77 84,78 84,79 C 84,80 80,80 76,80 Z" fill="#ffffff"/>
  </g>
</svg>
