<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="80" height="80">
  <!-- Chrome helmet dome -->
  <path d="M 25,55 C 25,25 75,25 75,55 Z" fill="#b0c4de" stroke="#1a1a2e" stroke-width="4.5" stroke-linejoin="round"/>
  <!-- Dome crease/ridge (Jay Garrick's helmet center metal crease) -->
  <path d="M 50,25 L 50,55" fill="none" stroke="#1a1a2e" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Helmet Brim -->
  <path d="M 15,55 Q 50,65 85,55 C 80,60 20,60 15,55 Z" fill="#d1d5db" stroke="#1a1a2e" stroke-width="4.5" stroke-linejoin="round"/>
  <!-- Golden wing on left side of the dome -->
  <path d="M 27,45 Q 12,30 8,15 Q 22,25 29,38 Z" fill="#ffd43f" stroke="#1a1a2e" stroke-width="3.5" stroke-linejoin="round"/>
  <path d="M 27,45 Q 16,38 12,28 Q 24,32 29,38 Z" fill="#ffd43f" stroke="#1a1a2e" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Golden wing on right side of the dome -->
  <path d="M 73,45 Q 88,30 92,15 Q 78,25 71,38 Z" fill="#ffd43f" stroke="#1a1a2e" stroke-width="3.5" stroke-linejoin="round"/>
  <path d="M 73,45 Q 84,38 88,28 Q 76,32 71,38 Z" fill="#ffd43f" stroke="#1a1a2e" stroke-width="3.5" stroke-linejoin="round"/>
</svg>
