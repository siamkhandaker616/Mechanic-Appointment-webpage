<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="80" height="80">
  <g transform="rotate(45 50 50)">
    <!-- Slender drop-forged handle (longer and narrower) -->
    <rect x="45" y="16" width="10" height="68" rx="3" fill="#b0c4de" stroke="#1a1a2e" stroke-width="4.5"/>
    <rect x="47.5" y="22" width="5" height="56" rx="1.5" fill="#9cb4cd" stroke="#1a1a2e" stroke-width="2.5"/>
    
    <!-- Open End Head (Top) - Sleeker & scaled down -->
    <path d="M 36,21 
             C 32,13 38,4 50,4 
             C 62,4 68,13 64,21 
             C 60,25 56,22 56,22 
             L 56,13 
             L 44,13 
             L 44,22 
             C 44,22 40,25 36,21 Z" 
          fill="#b0c4de" stroke="#1a1a2e" stroke-width="4.5" stroke-linejoin="round"/>
    <path d="M 44,13 L 56,13" stroke="#1a1a2e" stroke-width="3"/>
    
    <!-- Ring/Box End Head (Bottom) - Sleeker & scaled down -->
    <circle cx="50" cy="84" r="11.5" fill="#b0c4de" stroke="#1a1a2e" stroke-width="4.5"/>
    <!-- Outer socket teeth shape -->
    <polygon points="50,77 54,79 56,83 56,87 54,91 50,92 46,91 44,87 44,83 46,79" fill="#1a1a2e"/>
    <!-- Inner socket hole -->
    <polygon points="50,78 52,80 54,83 54,86 52,89 50,90 48,89 46,86 46,83 48,80" fill="#9cb4cd" stroke="#1a1a2e" stroke-width="2"/>
    
    <!-- Slender high-gloss metallic highlights -->
    <path d="M 47.5,23 L 47.5,77" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M 47,6 L 53,6" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
